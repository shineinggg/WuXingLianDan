<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuHei&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五行炼丹炉</title>
    <style>
        body {
            color: #2c2925;
            font-family: 'ZCOOL KuHei', "YouYuan", "Microsoft YaHei", sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            background-image: url('./assets/bg.png');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: #1a1a1a;
        }

        h1 {
            color: #f4d03f;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            margin-bottom: 5px;
            letter-spacing: 2px;
        }

        .subtitle {
            color: #ccc;
            margin-bottom: 15px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
        }

        .resource-bar {
            background: linear-gradient(145deg, #2a2a2a, #1f1f1f);
            color: #f4d03f;
            padding: 10px 25px;
            border-radius: 25px;
            border: 2px solid #555;
            margin-bottom: 15px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5), inset 0 2px 5px rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .epoch-banner {
            background: linear-gradient(90deg, rgba(75, 29, 29, 0.9), rgba(139, 58, 58, 0.9), rgba(75, 29, 29, 0.9));
            border: 2px solid #f4d03f;
            border-radius: 8px;
            padding: 10px 40px;
            margin-bottom: 25px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
            width: 80%;
            max-width: 800px;
        }

        .epoch-title {
            font-size: 1.5rem;
            font-weight: bold;
            color: #f4d03f;
            margin-bottom: 5px;
            text-shadow: 1px 1px 2px #000;
        }

        .epoch-books {
            font-size: 1rem;
            color: #ffebcd;
        }

        .progress-text {
            font-size: 0.85rem;
            color: #ccc;
            margin-top: 5px;
        }

        .game-layout {
            display: flex;
            gap: 20px;
            max-width: 1200px;
            width: 100%;
            justify-content: center;
            align-items: flex-start;
        }

        .quest-panel {
            width: 250px;
            background: rgba(30, 20, 10, 0.92);
            border: 2px solid #7e5109;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(244, 208, 63, 0.05);
        }
                .left-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 250px;
        }

        .store-panel {
            background: rgba(30, 20, 10, 0.92);
            border: 2px solid #7e5109;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(244, 208, 63, 0.05);
        }

        .store-panel h3 { margin-top: 0; color: #f4d03f; border-bottom: 1px solid #7e5109; padding-bottom: 5px; }

        .store-item {
            font-size: 0.85em;
            background: rgba(255, 250, 240, 0.06);
            border: 1px solid #7e5109;
            border-radius: 5px;
            padding: 10px;
            margin-bottom: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            color: #f0e0c0;
        }

        .buy-btn {
            background: linear-gradient(145deg, #7e5109, #a0680c);
            border: 1px solid #f4d03f;
            border-radius: 4px;
            padding: 5px;
            cursor: pointer;
            font-weight: bold;
            color: #f4d03f;
            transition: all 0.2s;
        }
        .buy-btn:hover { background: linear-gradient(145deg, #a0680c, #c07d0f); transform: scale(1.05); box-shadow: 0 0 8px rgba(244, 208, 63, 0.4); }
        .buy-btn:disabled { background: #3a2a0a; color: #6a5a30; cursor: not-allowed; transform: none; border-color: #4a3a10; }
        .quest-panel h3 {
            margin-top: 0;
            color: #f4d03f;
            border-bottom: 1px solid #7e5109;
            padding-bottom: 5px;
        }

        .quest-item {
            font-size: 0.88em;
            color: #d4c4a0;
            margin-bottom: 12px;
            background: rgba(255, 250, 240, 0.06);
            padding: 8px;
            border-radius: 5px;
            border-left: 3px solid #f4d03f;
            line-height: 1.5;
        }

        .quest-item strong {
            color: #f4d03f;
        }

        .comic-stage {
            position: relative;
            background: #2a2a2a;
            border-radius: 50%;
            border: 5px solid #444;
            width: 500px;
            height: 500px;
            box-shadow: inset 0 0 50px #000, 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        #cauldron-container {
            position: absolute;
            width: 140px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -40%);
        }

        #cauldron-img {
            width: 100%;
            animation: float 4s ease-in-out infinite;
            filter: drop-shadow(0 15px 25px rgba(255, 100, 0, 0.5));
            transition: all 0.3s;
        }

        #cauldron-img.absorbing {
            transform: scale(1.1);
            filter: drop-shadow(0 0 40px rgba(255, 200, 0, 0.9));
        }

        #cauldron-img.shaking {
            animation: shake 0.3s infinite;
        }

        #cauldron-status {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, 140px);
            color: #333;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.9);
            padding: 5px 15px;
            border-radius: 20px;
            border: 2px solid #000;
            white-space: nowrap;
            z-index: 10;
        }

        .element-icon {
            position: absolute;
            width: 60px;
            height: 60px;
            background: #fff;
            border: 3px solid #000;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            top: 50%;
            left: 50%;
            margin-top: -30px;
            margin-left: -30px;
            transform: rotate(var(--angle)) translateY(-200px) rotate(calc(-1 * var(--angle)));
            transition: all 0.2s;
        }

        .element-icon:hover {
            background: #ffeebf;
            transform: rotate(var(--angle)) translateY(-210px) rotate(calc(-1 * var(--angle))) scale(1.1);
        }

        /* --- 新增：QTE 火候系统样式 --- */
        #qte-container {
            position: absolute;
            top: 65%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 250px;
            background: rgba(30, 30, 30, 0.95);
            padding: 15px;
            border-radius: 8px;
            border: 2px solid #f4d03f;
            box-shadow: 0 0 20px rgba(244, 208, 63, 0.5);
            z-index: 50;
            display: none;
        }

        #qte-text {
            color: white;
            font-weight: bold;
            text-align: center;
            margin-bottom: 10px;
            font-size: 14px;
        }

        #qte-bar {
            position: relative;
            width: 100%;
            height: 20px;
            background: #c0392b;
            border-radius: 10px;
            border: 2px solid #555;
            overflow: hidden;
        }

        #qte-zone-safe {
            position: absolute;
            left: 20%;
            width: 60%;
            height: 100%;
            background: #27ae60;
        }

        #qte-zone-perfect {
            position: absolute;
            left: 45%;
            width: 10%;
            height: 100%;
            background: #f1c40f;
            box-shadow: 0 0 10px #f1c40f;
            z-index: 1;
        }

        #qte-pointer {
            position: absolute;
            left: 0%;
            top: 0;
            width: 4px;
            height: 100%;
            background: #fff;
            box-shadow: 0 0 8px #fff;
            z-index: 10;
        }

        #qte-stop-btn {
            display: block;
            margin: 15px auto 0;
            padding: 6px 20px;
            background: #8b3a3a;
            color: #f4d03f;
            border: 1px solid #f4d03f;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        #qte-stop-btn:hover {
            background: #a54646;
        }

        .right-panel {
            width: 350px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .info-panel {
            background: rgba(30, 20, 10, 0.92);
            border: 2px solid #7e5109;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(244, 208, 63, 0.05);
            color: #f0e0c0;
            display: none;
        }

        .info-panel h3 {
            color: #f4d03f;
            border-bottom: 1px solid #7e5109;
        }

        #collection-area {
            background: rgba(30, 20, 10, 0.92);
            border: 2px solid #7e5109;
            border-radius: 10px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-height: 100px;
        }

        .collection-item {
            padding: 5px 12px;
            background: rgba(244, 208, 63, 0.1);
            border: 1px solid #7e5109;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
            transition: all 0.2s;
            color: #f4d03f;
        }

        .collection-item.waste {
            background: rgba(100, 90, 60, 0.2);
            border-color: #4a3a10;
            color: #8a7a50;
        }

        .collection-item:hover {
            background: rgba(244, 208, 63, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 2px 8px rgba(244, 208, 63, 0.2);
        }

        /* 分类筛选按钮 */
        .category-btn {
            background: rgba(255, 250, 240, 0.06);
            border: 1px solid #7e5109;
            border-radius: 4px;
            color: #c0a060;
            cursor: pointer;
            padding: 3px 8px;
            font-size: 0.78em;
            transition: all 0.2s;
            font-family: inherit;
        }

        .category-btn:hover {
            background: rgba(244, 208, 63, 0.15);
            color: #f4d03f;
        }

        .category-btn.active {
            background: rgba(244, 208, 63, 0.2);
            border-color: #f4d03f;
            color: #f4d03f;
        }

        .category-stats {
            font-size: 0.8em;
            color: #8a7a50;
        }

        #collection-items-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .collection-group {
            width: 100%;
            margin-bottom: 10px;
        }

        .collection-group-title {
            font-size: 0.8em;
            color: #c0a060;
            margin-bottom: 6px;
            border-bottom: 1px solid rgba(126, 81, 9, 0.5);
            padding-bottom: 2px;
        }

        .collection-group-items {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        @keyframes shake {
            0% {
                transform: translate(1px, 1px) rotate(0deg);
            }

            20% {
                transform: translate(-3px, 0px) rotate(1deg);
            }

            40% {
                transform: translate(1px, -1px) rotate(1deg);
            }

            60% {
                transform: translate(-3px, 1px) rotate(0deg);
            }

            80% {
                transform: translate(-1px, -1px) rotate(1deg);
            }

            100% {
                transform: translate(1px, -2px) rotate(-1deg);
            }
        }
    </style>
</head>

<body>

    <h1>五行炼丹炉</h1>
    <div class="subtitle">合成基础元素与造物，还原中国古代八大科学名著之光</div>

    <div class="resource-bar">
        <span>💡 天工灵感：<span id="inspiration-count" style="font-size: 1.2em;">0</span></span>
        <span style="font-size: 0.9em; color: #aaa;">(产出：+<span id="inspiration-rate">0</span>/秒)</span>
        <span style="margin-left: 10px; font-size: 0.8em; color: #888;">*普通造物+1，完美火候造物+2</span>
    </div>

    <div class="epoch-banner" id="epoch-banner">
        <div class="epoch-title" id="epoch-title">第一纪元：【汉魏启蒙】</div>
        <div class="epoch-books" id="epoch-books">研读古籍：《九章算术》《齐民要术》《水经注》</div>
        <div class="progress-text" id="epoch-progress">收集进度：0 / 3 (即将解锁下一纪元)</div>
    </div>

    <div class="game-layout">
        <!-- 新增：用 left-panel 把任务面板和商店包起来 -->
        <div class="left-panel">
            <div class="quest-panel">
                <h3>📜 典籍悬赏残卷</h3>
                <div style="font-size: 0.8em; color:#8a7a50; margin-bottom:10px;">提示：将新合成的物品再次投入炉中，可触发科技大爆炸！</div>
                <div id="quest-panel-list"></div>
            </div>
    
            <!-- 新增：藏经阁（商店）面板 -->
            <div class="store-panel">
                <h3>🏪 藏经阁</h3>
                <div style="font-size: 0.8em; color:#8a7a50; margin-bottom:10px;">消耗灵感，兑换残卷获取配方提示！</div>
                <div id="store-list"></div>
            </div>
        </div>
    
        <div id="game-stage" class="comic-stage">
            <div id="cauldron-container">
                <img src="./assets/cauldron.png" alt="炼丹炉" id="cauldron-img"
                    onerror="this.outerHTML='<div style=\'font-size:80px; text-align:center;\'>🏺</div>'" />
            </div>
            <div id="cauldron-status">炉温已就绪...</div>
    
            <!-- --- 新增：QTE UI 容器 --- -->
            <div id="qte-container">
                <div id="qte-text">🔥 炉火游走，看准时机！</div>
                <div id="qte-bar">
                    <div id="qte-zone-safe"></div>
                    <div id="qte-zone-perfect"></div>
                    <div id="qte-pointer"></div>
                </div>
                <button id="qte-stop-btn">停 (Space)</button>
            </div>
    
            <div class="element-icon" style="--angle: 0deg;" data-name="金 🪙">金</div>
            <div class="element-icon" style="--angle: 72deg;" data-name="木 🪵">木</div>
            <div class="element-icon" style="--angle: 144deg;" data-name="水 💧">水</div>
            <div class="element-icon" style="--angle: 216deg;" data-name="火 🔥">火</div>
            <div class="element-icon" style="--angle: 288deg;" data-name="土 🪨">土</div>
        </div>
    
        <div class="right-panel">
        <div id="collection-area">
            <div style="width: 100%; color: #f4d03f; font-size: 14px; margin-bottom: 8px; font-weight:bold; border-bottom: 1px solid #7e5109; padding-bottom: 6px;">🎒 我的造物库 (点击放入炉中)</div>
            <!-- 新增分类筛选面板 -->
            <div class="category-filter" style="display:flex; flex-wrap:wrap; gap:4px; align-items:center; margin-bottom:8px;">
                <span style="color:#c0a060; font-size:0.82em;">分类：</span>
                <button class="category-btn active" data-category="all">全部</button>
                <button class="category-btn" data-category="原材料">原材料</button>
                <button class="category-btn" data-category="中间产物">中间产物</button>
                <button class="category-btn" data-category="农业与食品">农产</button>
                <button class="category-btn" data-category="工具与机械">机械</button>
                <button class="category-btn" data-category="文教与传播">文教</button>
                <button class="category-btn" data-category="建筑与工程">建筑</button>
                <button class="category-btn" data-category="医学与药材">医药</button>
                <button class="category-btn" data-category="武器与防御">武防</button>
            </div>
            <span class="category-stats" id="category-stats" style="display:block; margin-bottom:6px;">共收集：0 种 / 总计：50+ 种</span>
            <!-- 分类分组的造物展示区域 -->
            <div id="collection-items-container"></div>
        </div>
    
            <div class="info-panel" id="info-panel">
                <h3 style="margin-top: 0; color:#f4d03f; border-bottom:1px solid #7e5109; padding-bottom:5px;">🏺 新造物出炉！</h3>
                <p id="culture-text" style="color:#f0e0c0;"></p>
            </div>
        </div>
    </div>

    <script>
        // 典籍任务配置
                const questList = [
                {
                            id: 'qmyss', name: '《齐民要术》残卷',
                            desc: '“水土交融，万物生发。木石相击，利器方成。”',
                            goals: ['锄头/农具 🪓', '水渠/沟渠 🛤️'],
                            hint: '水土交融化为泥，泥再遇水则成渠；金石相磨可成磁，磁与木合方为导。',
                            cost: 0, purchased: true // 初始免费赠送
                        },
                        {
                            id: 'mxbt', name: '《梦溪笔谈》残卷',
                            desc: '“方家以磁石磨针锋，则能指南...”',
                            goals: ['指南针 🧭'],
                            hint: '土中藏金，可吸万物；与木相合，方指南北。',
                            cost: 150, purchased: false // 需要购买
                        },
                        {
                            id: 'tgkw', name: '《天工开物》残卷',
                            desc: '“风声雨声，典籍不灭；巨舰火炮，威震四海。”',
                            goals: ['太学/书院 🏛️', '罗盘远洋宝船 🛳️'],
                            hint: '典籍需土木为基，航海需帆与指南；先有纸与墨，方有文明之光。',
                            cost: 300, purchased: false // 需要购买
                        },
                        {
                            id: 'bcgm', name: '《本草纲目》残卷',
                            desc: '"药有个性之奇，方有合群之妙。"',
                            goals: ['熬制汤药 🥣', '炒制茶叶 🍵'],
                            hint: '沸汽蒸腾可出药性，草木遇炭方得茶香。',
                            cost: 350, purchased: false
                        },
                        {
                            id: 'kgj', name: '《考工记》残卷',
                            desc: '"百工之事，皆圣人之作也。"',
                            goals: ['百炼钢 ⚔️', '织布机 🧵'],
                            hint: '炭火炼真金，千锤成钢；木为骨架，麻可织机。',
                            cost: 400, purchased: false
                        },
                        {
                            id: 'nzqs', name: '《农政全书》残卷',
                            desc: '"水利为农业之本，机械为灌溉之具。"',
                            goals: ['木制水车 🎡', '都江堰水利工程 🏞️'],
                            hint: '水循渠行，木转轮动；土木相合，泽被千里。',
                            cost: 450, purchased: false
                        },
                        {
                            id: 'hgjn', name: '《黄帝内经》残卷',
                            desc: '"上医治未病，百病皆可药。"',
                            goals: ['针灸铜人模型 🧍', '药酒/麻沸散 🍷'],
                            hint: '酒能融药性，铜可铸经络；根入酒中方成药，铜模刻穴传针道。',
                            cost: 500, purchased: false
                        },
                        {
                            id: 'wzzy', name: '《武经总要》残卷',
                            desc: '"兵者，国之大事，死生之地，存亡之道。"',
                            goals: ['火炮/火枪 🔫', '锻铁兵器 ⚔️'],
                            hint: '火药遇钢，雷霆万钧；百炼之钢，木柄为兵。',
                            cost: 600, purchased: false
                }
                ];

                function renderQuests() {
                            let html = '';
                            // 只渲染已经购买的
                            questList.filter(q => q.purchased).forEach(q => {
                                const done = q.goals.every(goal => unlockedItems.has(goal));
                                html += `
                <div class="quest-item" style="${done ? 'opacity:0.7;' : ''}">
                  <strong>${q.name}${done ? ' <span style="color:#7ec87e;">✔ 已完成</span>' : ''}</strong><br>
                  <span style="color:#d4c4a0">${q.desc}</span><br>
                  <span style="color:#c0a060">目标：${q.goals.map(goal => unlockedItems.has(goal) ? `<span style="color:#7ec87e;font-weight:bold;">【${goal}】</span>` : `【${goal}】`).join(' 与 ')}</span><br>
                  <span style="font-size: 0.85em; color: #7a6a4a;">💡 ${q.hint}</span>
                </div>`;
                            });
                            document.getElementById('quest-panel-list').innerHTML = html;
                        }

                        // 新增：渲染商店列表
                        function renderStore() {
                            let html = '';
                            const unpurchased = questList.filter(q => !q.purchased);
                            if (unpurchased.length === 0) {
                                html = `<div style="text-align:center; color:#888; font-size:0.9em; padding: 10px;">残卷已全部收集完毕！</div>`;
                            } else {
                                unpurchased.forEach(q => {
                                    html += `
                    <div class="store-item">
                        <strong style="color:#f4d03f;">📜 ${q.name}</strong>
                        <span style="color:#b0a080; font-size:0.9em;">解锁配方提示...</span>
                        <button class="buy-btn" data-cost="${q.cost}" onclick="buyQuest('${q.id}')">
                            消耗 ${q.cost} 灵感
                        </button>
                    </div>`;

                    createSuccessUI({
                        name: "废渣 🪨",
                        poem: "",
                        classic_quote: "《天工开物》载：凡物相克，水火不容，强融必溃。",
                        detail: "两种属性冲突或缺乏关联的物质强行融合，化为了无用的废弃物。",
                        wiki: "实验失败的产物。"
                    }, modifier);
                }
                resetFurnace();
            }, 500);
        }

        // --- 修改：渲染结果并根据完美火候计算双倍资源 ---
        function createSuccessUI(data, modifier) {
    infoPanel.style.display = 'block';
    let poemHTML = data.poem && data.poem.trim() !== "" ? `<i style="color: #555;">「${data.poem}」</i><br><br>` : "";

    cultureText.innerHTML = `
        <strong style="font-size: 1.3em; color: ${modifier === 'perfect' ? '#f1c40f' : '#d9534f'};">【${data.name}】</strong><br><br>
        ${poemHTML}
        <span style="color: #8b3a3a; font-weight: bold;">📖 典籍出处：</span>
        <span style="color: #5c4033; font-style: italic;">${data.classic_quote}</span><br><br>
        <span style="color: #333;"><strong>⚙️ 技术解读：</strong>${data.detail}</span><br><br>
        <span style="color: #2c3e50; font-size: 0.85em;"><strong>📚 百科：</strong>${data.wiki}</span>
    `;

    // 判断并解锁
    let baseName = data.name.replace(" ✨ ", " ");
    if (!unlockedItems.has(baseName)) {
        unlockedItems.add(baseName);

        const isWaste = /渣|碎|泥|朽|废|灰|汽/.test(baseName);
        if (!isWaste) {
            let gain = (modifier === "perfect") ? 2 : 1;
            inspirationRate += gain;
            document.getElementById('inspiration-rate').innerText = inspirationRate;
        }
        renderCollectionItems();  // 造物库UI唯一刷新点！

        checkEpochProgress();
        renderQuests();
    }
}

        function checkEpochProgress() {
            let validCount = Array.from(document.querySelectorAll('.collection-item:not(.waste)')).length;
            let target = epochs[currentEpoch].nextTarget;

            if (validCount >= target && currentEpoch < 3) {
                currentEpoch++;
                alert(`🎉 恭喜！文明演进！\n您已解锁 ${epochs[currentEpoch].title}\n可以查阅更高级的典籍了！`);
                target = epochs[currentEpoch].nextTarget;
            }

            document.getElementById('epoch-title').innerText = epochs[currentEpoch].title;
            document.getElementById('epoch-books').innerText = epochs[currentEpoch].books;
            document.getElementById('epoch-progress').innerText = currentEpoch === 3 ? `已集大成，当前有效造物：${validCount}` : `收集进度：${validCount} / ${target} (即将解锁下一纪元)`;
        }

        function resetFurnace() {
            currentRecipe = [];
            isCrafting = false;
            if (cauldronImg.classList) cauldronImg.classList.remove('shaking');
            statusText.innerText = "等待投入材料...";
            statusText.style.color = "#333";
        }

        // 初始化
        checkEpochProgress();
        renderQuests();
        renderStore(); 
    </script>
</body>
